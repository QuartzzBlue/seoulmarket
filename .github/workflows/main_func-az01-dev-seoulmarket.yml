name: Build and deploy Node.js project to Azure Function App - func-az01-dev-seoulmarket

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: 'func-az01-dev-seoulmarket'
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'
  NODE_VERSION: '22.x'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve Project Dependencies Using Npm
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          npm ci
          npm run build --if-present
          npm run test --if-present
          popd

      - name: Zip artifact for deployment
        shell: bash
        run: |
          # node_modules는 포함(remote-build=false이므로 런타임이 직접 참조)
          # .playwright는 제외: Azure 런타임에서 OS 의존성이 달라 로컬 빌드 바이너리를 쓸 수 없음
          # 대신 앱 시작 시 PLAYWRIGHT_BROWSERS_PATH 경로에 chromium을 설치하는 방식 필요
          zip -r release.zip . \
            -x "*.git*" \
            -x "release.zip" \
            -x ".playwright/*" \
            -x "src/*" \
            -x "scripts/*" \
            -x "*.ts" \
            -x "tsconfig*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_32FA579DEFA241D080FFD314170E4037 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_68E23EE345B243CA9638E8A72DFC273D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0068ABD53487467A8800AABB3A3FBBB6 }}

      - name: Run Azure Functions Action
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          slot-name: 'Production'
          package: release.zip
